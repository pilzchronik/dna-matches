<!DOCTYPE html>
<html lang="{{ page.lang | default: 'de' }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{{ page.description }}">
    <title>{{ page.title }}</title>

    <link rel="alternate" hreflang="de" href="{{ site.url }}{{ site.baseurl }}/" />
    <link rel="alternate" hreflang="en" href="{{ site.url }}{{ site.baseurl }}/en/" />

    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

    {% if page.extra_head %}
    {{ page.extra_head }}
    {% endif %}
</head>
<body>

{{ content }}

    <script>
        // SMOOTH SCROLL (shared)
        document.querySelectorAll('nav a').forEach(anchor => {
            anchor.addEventListener('click', function(e) {
                if (this.classList.contains('inactive-lang') || this.classList.contains('active-lang')) return;
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({ behavior: 'smooth' });
                }
            });
        });
    </script>
</body>
</html>
