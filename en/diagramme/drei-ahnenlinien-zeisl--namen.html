<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Three ancestral lines to the Zeisl family — plus the Chr-9 large segment</title>
<style>
  /* Names variant (for embedding in the name-based index). Same house-style system. */
  :root{
    --bg:#eef3f2;
    --card:#ffffff;
    --ink:#1f3b39;
    --ink-soft:#4a5c5c;
    --muted:#8b9a9a;
    --teal:#0e9f8e;
    --teal-deep:#0a6c60;
    --teal-core:#064b43;
    --violet:#6d5bd0;
    --violet-deep:#4a3aa6;
    --coral:#e0734e;
    --coral-deep:#b8502e;
    --cobalt:#2f7fd0;
    --cobalt-deep:#1f5fa3;
    --grey:#9aa6ac;
    --grey-deep:#6f7a80;
    --bar:#dde4e4;
    --bar-edge:#c4cfcf;
    --hair:#e3eae9;
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:"Inter","Segoe UI",system-ui,-apple-system,Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
    padding:24px 16px;
  }
  .frame{
    max-width:1040px;
    margin:0 auto;
    background:var(--card);
    border:1px solid var(--hair);
    border-radius:18px;
    box-shadow:0 10px 30px rgba(20,60,55,.08);
    padding:18px 14px 8px;
  }
  .chart-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
  svg.chart{display:block;width:100%;min-width:720px;max-width:1000px;height:auto;margin:0 auto}

  .title{font-size:24px;font-weight:800;fill:var(--ink);letter-spacing:.2px}
  .subtitle{font-size:13px;font-weight:500;fill:var(--muted)}
  .h{font-size:14px;font-weight:700;fill:var(--ink)}
  .b{font-size:12px;font-weight:500;fill:var(--ink-soft)}
  .m{font-size:11.5px;font-weight:600;fill:var(--ink)}
  .it{font-size:11px;font-style:italic;font-weight:400;fill:var(--muted)}
  .leg{font-size:12px;font-weight:500;fill:var(--ink-soft)}
  .cap{font-size:11px;font-weight:400;fill:var(--muted)}
  .nodelbl{font-size:13.5px;font-weight:700;fill:var(--ink);text-anchor:middle}
  .centerlbl{font-size:14px;font-weight:800;fill:var(--teal-deep);text-anchor:middle}
  .iconlbl{font-size:13px;font-weight:700;fill:var(--teal-deep);text-anchor:middle}

  .card{fill:var(--card);stroke:var(--hair);stroke-width:1}
  .panel{fill:#f1f7f6;stroke:var(--hair);stroke-width:1}
  .accent{stroke-width:4;stroke-linecap:round}
  .pill{fill:#ffffff;stroke:var(--teal);stroke-width:1.6}
  .conn{fill:none;transition:stroke-width .18s ease, filter .18s ease}

  .zone{cursor:default}
  .zone .card,.zone .conn{transition:stroke .18s ease, stroke-width .18s ease, filter .18s ease}
  .zone:hover .card{stroke-width:1.8}
  .zone:hover .conn{stroke-width:3.6;filter:brightness(1.05)}
  .z-coral:hover .card{stroke:var(--coral)}
  .z-violet:hover .card{stroke:var(--violet)}
  .z-cobalt:hover .card{stroke:var(--cobalt)}
  .z-teal:hover .card{stroke:var(--teal)}
</style>
</head>
<body>
  <div class="frame">
    <div class="chart-wrap">
      <svg class="chart" viewBox="0 0 1000 778" role="img"
           aria-label="Network diagram: three independent ancestral lines to the Zeisl family plus the main match's Chr-9 large segment">
        <defs>
          <filter id="cardshadow" x="-10%" y="-20%" width="120%" height="150%">
            <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1f3b39" flood-opacity="0.10"/>
          </filter>
        </defs>

        <rect x="0" y="0" width="1000" height="778" fill="#ffffff"/>

        <text class="title" x="40" y="42">Three ancestral lines to the Zeisl family — plus the Chr-9 large segment</text>
        <text class="subtitle" x="40" y="63">43 shared matches · GEDmatch triangulation · own finding (E), work in progress</text>

        <!-- ============ PART A — principle explainer ============ -->
        <g>
          <rect class="panel" x="30" y="80" width="940" height="150" rx="12"/>
          <text class="h" x="50" y="106">How triangulation works</text>
          <g>
            <line x1="110" y1="150" x2="80"  y2="200" stroke="var(--teal)" stroke-width="1.6"/>
            <line x1="110" y1="150" x2="150" y2="200" stroke="var(--teal)" stroke-width="1.6"/>
            <line x1="80"  y1="200" x2="150" y2="200" stroke="var(--teal)" stroke-width="1.6"/>
            <circle cx="110" cy="150" r="17" fill="#ffffff" stroke="var(--teal)" stroke-width="2"/>
            <circle cx="80"  cy="200" r="17" fill="#ffffff" stroke="var(--teal)" stroke-width="2"/>
            <circle cx="150" cy="200" r="17" fill="#ffffff" stroke="var(--teal)" stroke-width="2"/>
            <text class="iconlbl" x="110" y="155">1</text>
            <text class="iconlbl" x="80"  y="205">2</text>
            <text class="iconlbl" x="150" y="205">3</text>
          </g>
          <g>
            <text class="m" x="186" y="150">1</text>
            <text class="m" x="186" y="176">2</text>
            <text class="m" x="186" y="202">3</text>
            <rect x="200" y="141" width="130" height="10" rx="3" fill="var(--bar)"/>
            <rect x="200" y="167" width="130" height="10" rx="3" fill="var(--bar)"/>
            <rect x="200" y="193" width="130" height="10" rx="3" fill="var(--bar)"/>
            <rect x="246" y="141" width="26" height="10" rx="2" fill="var(--teal)"/>
            <rect x="246" y="167" width="26" height="10" rx="2" fill="var(--teal)"/>
            <rect x="246" y="193" width="26" height="10" rx="2" fill="var(--teal)"/>
            <text class="it" x="200" y="219">same segment, same location</text>
          </g>
          <text class="b" x="362" y="116">Triangulation: if three people share the same segment at the same place</text>
          <text class="b" x="362" y="134">and match pairwise, the segment traces back to a common</text>
          <text class="b" x="362" y="152">ancestor.</text>
          <text class="it" x="362" y="178">In Ashkenazi Jewish lines triangulation proves an ancestor,</text>
          <text class="it" x="362" y="194">but not how close — short segments (7–15 cM) can reach</text>
          <text class="it" x="362" y="210">back many centuries.</text>
        </g>

        <!-- ============ PART B — main graphic ============ -->

        <!-- dotted link: small segment → Line-A region -->
        <path d="M400,562 L350,464" fill="none" stroke="var(--teal)" stroke-width="1.6" stroke-dasharray="3 3"/>
        <text class="it" x="376" y="512" fill="var(--teal-deep)" text-anchor="middle">in Line A</text>

        <!-- ZONE: Line A (hero, coral) -->
        <g class="zone z-coral">
          <path class="conn" d="M420,502 Q386,480 358,465" stroke="var(--coral)" stroke-width="2.6"/>
          <g filter="url(#cardshadow)"><rect class="card" x="40" y="250" width="350" height="214" rx="10"/></g>
          <line class="accent" x1="43" y1="262" x2="43" y2="452" stroke="var(--coral)"/>
          <text class="h"  x="56" y="272" fill="var(--coral-deep)">Line A — petctdoc cluster</text>
          <text class="b"  x="56" y="291">Chr 2 (7–12) · Chr 8 (3–5) · Chr 9 (2–7 Mb)</text>
          <text class="m"  x="56" y="313">petctdoc · 26.4 cM</text>
          <text class="it" x="186" y="313">★ in all 3 segments</text>
          <text class="m"  x="56" y="333">yaronk · 14.3 cM</text>
          <text class="m"  x="56" y="353">Irving Greene · 14.3 cM</text>
          <text class="m"  x="56" y="373">Pearl Friedman · 13.1 cM</text>
          <text class="m"  x="56" y="393">Rebecca Gerard · 13.0 cM</text>
          <text class="it" x="56" y="416">densest line; common ancestor no earlier than</text>
          <text class="it" x="56" y="430">~4–5 gen (≈1780–1830), possibly much deeper</text>
          <text class="it" x="56" y="450" fill="var(--coral-deep)">Kimble not in the core (own Chr-2 segment)</text>
        </g>

        <!-- ZONE: Line C (cobalt) -->
        <g class="zone z-cobalt">
          <path class="conn" d="M705,502 Q696,470 690,441" stroke="var(--cobalt)" stroke-width="2.6"/>
          <g filter="url(#cardshadow)"><rect class="card" x="610" y="250" width="350" height="190" rx="10"/></g>
          <line class="accent" x1="613" y1="262" x2="613" y2="428" stroke="var(--cobalt)"/>
          <text class="h"  x="626" y="272" fill="var(--cobalt-deep)">Line C — Kieserman</text>
          <text class="b"  x="626" y="291">Chr 14 (90–96 Mb)</text>
          <text class="m"  x="626" y="313">Scott Kieserman · 17.2 cM</text>
          <text class="m"  x="626" y="333">peter weiskopf · 15.2 cM</text>
          <text class="m"  x="626" y="353">Sally Strasburger Stephenson · 12.7 cM</text>
          <text class="m"  x="626" y="373">Esther Reynga · 12.7 cM</text>
          <text class="it" x="626" y="396">statistically best supported</text>
          <text class="it" x="626" y="410">(all pairs triangulate)</text>
        </g>

        <!-- ZONE: Line B (violet) — middle-left height -->
        <g class="zone z-violet">
          <path class="conn" d="M410,512 Q388,520 342,528" stroke="var(--violet)" stroke-width="2.6"/>
          <g filter="url(#cardshadow)"><rect class="card" x="40" y="484" width="300" height="120" rx="10"/></g>
          <line class="accent" x1="43" y1="496" x2="43" y2="592" stroke="var(--violet)"/>
          <text class="h"  x="56" y="508" fill="var(--violet-deep)">Line B — Gold/Nathanson</text>
          <text class="b"  x="56" y="527">Chr 2 (13–24 Mb)</text>
          <text class="m"  x="56" y="549">Laura Gold · 15.3 cM</text>
          <text class="m"  x="56" y="569">MJNathanson · 13.9 cM</text>
          <text class="it" x="56" y="592">own line, adjoins A, does not overlap</text>
        </g>

        <!-- ZONE: Large segment D (teal, at the centre) -->
        <g class="zone z-teal">
          <path class="conn" d="M650,542 Q654,551 658,562" stroke="var(--teal)" stroke-width="2.6"/>
          <g filter="url(#cardshadow)"><rect class="card" x="562" y="562" width="330" height="130" rx="10"/></g>
          <line class="accent" x1="565" y1="574" x2="565" y2="680" stroke="var(--teal)"/>
          <text class="h"  x="580" y="586" fill="var(--teal-deep)">Large segment D · 29.1 cM</text>
          <text class="b"  x="580" y="605">Chr 9 · 76–95 Mb</text>
          <text class="m"  x="580" y="626">Triangulation partners:</text>
          <text class="m"  x="580" y="644">Greer · DT8121664 · Inna Epstein</text>
          <text class="it" x="580" y="666">part of the main match — not a separate ancestor;</text>
          <text class="it" x="580" y="680">triangulates on Wolfgang's side (since 24 Jun)</text>
        </g>

        <!-- small segment (7.5 cM) – chip at the centre -->
        <g>
          <line x1="465" y1="542" x2="458" y2="562" stroke="var(--teal)" stroke-width="2"/>
          <rect x="360" y="562" width="188" height="44" rx="10" fill="#eafaf7" stroke="var(--teal)" stroke-width="1.4"/>
          <text class="m"  x="372" y="583" fill="var(--teal-deep)">small segment · 7.5 cM</text>
          <text class="it" x="372" y="599">Chr 9 · 2.7–5.3 Mb</text>
        </g>

        <!-- CENTRE: Wolfgang ↔ Zeisl -->
        <g>
          <text class="centerlbl" x="565" y="492">36.57 cM · main match</text>
          <line x1="540" y1="522" x2="560" y2="522" stroke="var(--teal)" stroke-width="3"/>
          <rect class="pill" x="410" y="502" width="130" height="40" rx="20"/>
          <text class="nodelbl" x="475" y="527">Wolfgang Pilz</text>
          <rect class="pill" x="560" y="502" width="190" height="40" rx="20"/>
          <text class="nodelbl" x="655" y="527">Walter Steven Zeisl</text>
        </g>

        <!-- ============ Legend ============ -->
        <g class="leg">
          <rect x="40"  y="712" width="16" height="16" rx="3" fill="var(--coral)"/>
          <text x="63"  y="725">Line A (densest)</text>
          <rect x="225" y="712" width="16" height="16" rx="3" fill="var(--violet)"/>
          <text x="248" y="725">Line B</text>
          <rect x="330" y="712" width="16" height="16" rx="3" fill="var(--cobalt)"/>
          <text x="353" y="725">Line C (best supported)</text>
          <rect x="640" y="712" width="16" height="16" rx="3" fill="var(--teal)"/>
          <text x="663" y="725">Large segment D (part of the main match)</text>
        </g>

        <!-- ============ Caption ============ -->
        <text class="cap" x="40" y="750">Own finding from GEDmatch triangulation (2026), 43 shared matches. cM values and kit codes in the research archive.</text>
        <text class="cap" x="40" y="764">Work in progress, no primary source.</text>
      </svg>
    </div>
  </div>
</body>
</html>
