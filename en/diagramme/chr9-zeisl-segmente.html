<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Chromosome 9 — shared DNA segments around the Zeisl line</title>
<style>
  /* Self-contained styling – does NOT inherit the site CSS.
     Deliberate contrast to the book and the website look: cool off-white,
     teal + violet, clean grotesque sans. */
  :root{
    --bg:#eef3f2;
    --card:#ffffff;
    --ink:#1f3b39;
    --ink-soft:#4a5c5c;
    --muted:#8b9a9a;
    --teal:#0e9f8e;
    --teal-deep:#0a6c60;
    --teal-core:#064b43;
    --violet:#6d5bd0;
    --violet-deep:#4a3aa6;
    --grey:#9aa6ac;
    --grey-deep:#6f7a80;
    --bar:#dde4e4;
    --bar-edge:#c4cfcf;
    --hair:#e3eae9;
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:"Inter","Segoe UI",system-ui,-apple-system,Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
    padding:24px 16px;
  }
  .frame{
    max-width:1040px;
    margin:0 auto;
    background:var(--card);
    border:1px solid var(--hair);
    border-radius:18px;
    box-shadow:0 10px 30px rgba(20,60,55,.08);
    padding:18px 14px 8px;
  }
  .chart-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
  svg.chart{display:block;width:100%;min-width:720px;max-width:1000px;height:auto;margin:0 auto}

  /* SVG typography */
  .title{font-size:26px;font-weight:800;fill:var(--ink);letter-spacing:.2px}
  .subtitle{font-size:13px;font-weight:500;fill:var(--muted)}
  .h{font-size:14px;font-weight:700;fill:var(--ink)}
  .b{font-size:12px;font-weight:500;fill:var(--ink-soft)}
  .it{font-size:11px;font-style:italic;font-weight:400;fill:var(--muted)}
  .warn{font-size:12px;font-weight:700;fill:var(--grey-deep)}
  .axis{font-size:12px;font-weight:500;fill:var(--muted)}
  .cen{font-size:10px;font-style:italic;font-weight:500;fill:var(--muted)}
  .leg{font-size:12px;font-weight:500;fill:var(--ink-soft)}
  .cap{font-size:11px;font-weight:400;fill:var(--muted)}
  .bracketlbl{font-size:13px;font-weight:700;fill:var(--teal-deep)}
  .tip{font-size:13px;font-weight:800;text-anchor:middle;opacity:0;transition:opacity .18s ease}

  /* Cards */
  .card{fill:var(--card);stroke:var(--hair);stroke-width:1}
  .accent{stroke-width:4;stroke-linecap:round}

  /* Hover interaction (fully legible without hover) */
  .zone{cursor:default}
  .zone .seg{transition:filter .18s ease, stroke-width .18s ease}
  .zone:hover .seg{filter:brightness(1.08) saturate(1.06)}
  .zone:hover .card{stroke:var(--teal);stroke-width:1.6}
  .zone:hover .tip{opacity:1}
  .z-violet:hover .card{stroke:var(--violet)}
  .z-grey:hover .card{stroke:var(--grey-deep)}
</style>
</head>
<body>
  <div class="frame">
    <div class="chart-wrap">
      <svg class="chart" viewBox="0 0 1000 700" role="img"
           aria-label="Ideogram of chromosome 9 with five shared DNA segment zones around the Zeisl line">
        <defs>
          <clipPath id="barclip">
            <rect x="70" y="350" width="836" height="60" rx="30"/>
          </clipPath>
          <filter id="cardshadow" x="-10%" y="-20%" width="120%" height="150%">
            <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1f3b39" flood-opacity="0.10"/>
          </filter>
        </defs>

        <rect x="0" y="0" width="1000" height="700" fill="#ffffff"/>

        <!-- Title -->
        <text class="title" x="40" y="42">Chromosome 9 — shared DNA segments around the Zeisl line</text>
        <text class="subtitle" x="40" y="64">Human genome · reference GRCh37/hg19 · axis 0–141 megabases (Mb)</text>

        <!-- ============ Chromosome capsule ============ -->
        <rect x="70" y="350" width="836" height="60" rx="30" fill="var(--bar)" stroke="var(--bar-edge)" stroke-width="1.5"/>

        <!-- Centromere ~49 Mb (x=360.6): subtle constriction -->
        <g>
          <polygon points="351,350 370,350 360.6,361" fill="#ffffff"/>
          <polygon points="351,410 370,410 360.6,399" fill="#ffffff"/>
          <line x1="360.6" y1="350" x2="360.6" y2="410" stroke="var(--bar-edge)" stroke-width="1" stroke-dasharray="2 2"/>
          <text class="cen" x="360.6" y="447" text-anchor="middle">Centromere ≈ 49 Mb</text>
        </g>

        <!-- ============ Mb axis ============ -->
        <g class="axis">
          <g text-anchor="middle">
            <line x1="70"     y1="410" x2="70"     y2="420" stroke="var(--bar-edge)"/>
            <text x="70"   y="434">0</text>
            <line x1="188.6"  y1="410" x2="188.6"  y2="420" stroke="var(--bar-edge)"/>
            <text x="188.6"  y="434">20</text>
            <line x1="307.2"  y1="410" x2="307.2"  y2="420" stroke="var(--bar-edge)"/>
            <text x="307.2"  y="434">40</text>
            <line x1="425.9"  y1="410" x2="425.9"  y2="420" stroke="var(--bar-edge)"/>
            <text x="425.9"  y="434">60</text>
            <line x1="544.5"  y1="410" x2="544.5"  y2="420" stroke="var(--bar-edge)"/>
            <text x="544.5"  y="434">80</text>
            <line x1="663.1"  y1="410" x2="663.1"  y2="420" stroke="var(--bar-edge)"/>
            <text x="663.1"  y="434">100</text>
            <line x1="781.7"  y1="410" x2="781.7"  y2="420" stroke="var(--bar-edge)"/>
            <text x="781.7"  y="434">120</text>
            <line x1="900.3"  y1="410" x2="900.3"  y2="420" stroke="var(--bar-edge)"/>
            <text x="900.3"  y="434">140</text>
          </g>
          <text x="924" y="434" text-anchor="start">Mb</text>
        </g>

        <!-- ============ Connecting bracket Zeisl (zone 1 ↔ zone 3) ============ -->
        <g>
          <text class="bracketlbl" x="336.5" y="300" text-anchor="middle">Walter Zeisl — the same match on both chromosome arms · 36.57 cM total</text>
          <path d="M93,306 V312 H580 V306" fill="none" stroke="var(--teal)" stroke-width="2"/>
        </g>

        <!-- ============ ZONE 1 — Small Zeisl segment ============ -->
        <g class="zone z-teal">
          <g filter="url(#cardshadow)">
            <rect class="card" x="30" y="98" width="262" height="106" rx="10"/>
          </g>
          <line class="accent" x1="33" y1="108" x2="33" y2="194" stroke="var(--teal)"/>
          <text class="h"  x="48" y="120">① Small Zeisl segment</text>
          <text class="b"  x="48" y="139">Wolfgang ↔ Walter Zeisl · <tspan font-weight="700" fill="var(--teal-deep)">7.5 cM</tspan></text>
          <text class="b"  x="48" y="156">2.7–5.3 Mb</text>
          <text class="it" x="48" y="175">also triangulation group</text>
          <text class="it" x="48" y="190">~2.6–5.7 Mb / Line A</text>
          <line x1="93.7" y1="204" x2="93.7" y2="278" stroke="var(--teal)" stroke-width="1.4"/>
          <line x1="93.7" y1="308" x2="93.7" y2="350" stroke="var(--teal)" stroke-width="1.4"/>
          <rect class="seg" x="86" y="354" width="16" height="52" rx="4" fill="var(--teal)" stroke="var(--teal-deep)" stroke-width="1" clip-path="url(#barclip)"/>
          <text class="tip" x="93.7" y="343" fill="var(--teal-deep)">7.5 cM</text>
        </g>

        <!-- ============ ZONE 3 — Large segment D ============ -->
        <g class="zone z-teal">
          <g filter="url(#cardshadow)">
            <rect class="card" x="420" y="98" width="300" height="74" rx="10"/>
          </g>
          <line class="accent" x1="423" y1="108" x2="423" y2="162" stroke="var(--teal)"/>
          <text class="h"  x="438" y="120">③ Large segment D</text>
          <text class="b"  x="438" y="139">Wolfgang ↔ Walter Zeisl · <tspan font-weight="700" fill="var(--teal-deep)">29.1 cM</tspan></text>
          <text class="b"  x="438" y="156">76.4–95.8 Mb · strongest match</text>
          <line x1="580.7" y1="172" x2="580.7" y2="278" stroke="var(--teal)" stroke-width="1.4"/>
          <line x1="580.7" y1="308" x2="580.7" y2="350" stroke="var(--teal)" stroke-width="1.4"/>
          <rect class="seg" x="523" y="354" width="115" height="52" rx="4" fill="var(--teal)" stroke="var(--teal-deep)" stroke-width="1" clip-path="url(#barclip)"/>
          <text class="tip" x="555" y="343" fill="var(--teal-deep)">29.1 cM</text>
        </g>

        <!-- ============ ZONE 5 — Fisher segment (de-emphasized) ============ -->
        <g class="zone z-grey">
          <g filter="url(#cardshadow)">
            <rect class="card" x="735" y="98" width="255" height="92" rx="10"/>
          </g>
          <line class="accent" x1="738" y1="108" x2="738" y2="180" stroke="var(--grey)"/>
          <text class="h"  x="753" y="120" fill="var(--grey-deep)">⑤ Fisher segment</text>
          <text class="b"  x="753" y="139">Walter Zeisl ↔ Herbert Fisher</text>
          <text class="b"  x="753" y="156">136.8–138.0 Mb · part of 56 cM</text>
          <text class="warn" x="753" y="175">NOT shared with Wolfgang</text>
          <line x1="884.9" y1="190" x2="884.9" y2="350" stroke="var(--grey)" stroke-width="1.2" stroke-dasharray="3 3"/>
          <rect class="seg" x="881" y="356" width="8" height="48" rx="3" fill="var(--grey)" stroke="var(--grey-deep)" stroke-width="1" opacity="0.8" clip-path="url(#barclip)"/>
          <text class="tip" x="884.9" y="343" fill="var(--grey-deep)">Fisher</text>
        </g>

        <!-- ============ ZONE 2 — Bernstein/Levine group (below) ============ -->
        <g class="zone z-violet">
          <line x1="195" y1="410" x2="195" y2="460" stroke="var(--violet)" stroke-width="1.4"/>
          <g filter="url(#cardshadow)">
            <rect class="card" x="40" y="460" width="338" height="84" rx="10"/>
          </g>
          <line class="accent" x1="43" y1="470" x2="43" y2="534" stroke="var(--violet)"/>
          <text class="h"  x="58" y="484">② Bernstein/Levine group</text>
          <text class="b"  x="58" y="503">21.1 cM · 17.6 cM (single segment) · 15–27 Mb</text>
          <text class="it" x="58" y="525">Wolfgang matches — link to the Zeisl line open</text>
          <rect class="seg" x="159" y="354" width="72" height="52" rx="4" fill="var(--violet)" stroke="var(--violet-deep)" stroke-width="1" clip-path="url(#barclip)"/>
          <text class="tip" x="195" y="343" fill="var(--violet-deep)">21.1 cM</text>
        </g>

        <!-- ============ ZONE 4 — Triangulation core TG9_0 (band within zone 3, below) ============ -->
        <g class="zone z-teal">
          <line x1="603.2" y1="410" x2="603.2" y2="460" stroke="var(--teal-core)" stroke-width="1.4"/>
          <g filter="url(#cardshadow)">
            <rect class="card" x="430" y="460" width="350" height="98" rx="10"/>
          </g>
          <line class="accent" x1="433" y1="470" x2="433" y2="548" stroke="var(--teal-core)"/>
          <text class="h"  x="448" y="484">④ Triangulation core TG9_0</text>
          <text class="b"  x="448" y="503">Zeisl · Cohen · Jovings · Wolfgang</text>
          <text class="b"  x="448" y="520">87.6–92.2 Mb (core within large segment D)</text>
          <text class="it" x="448" y="540">further partners: M-013 · M-014 · M-028 (79–94 Mb)</text>
          <g clip-path="url(#barclip)" stroke="#ffffff" stroke-width="2" opacity="0.55" stroke-linecap="round">
            <line x1="539.7" y1="360" x2="592.0" y2="360"/>
            <line x1="570.6" y1="364" x2="618.7" y2="364"/>
            <line x1="584.9" y1="368" x2="625.2" y2="368"/>
          </g>
          <rect class="seg" x="590" y="361" width="27" height="38" rx="3" fill="var(--teal-core)" stroke="#ffffff" stroke-width="1.2" clip-path="url(#barclip)"/>
          <text class="tip" x="603.2" y="343" fill="var(--teal-core)">Core</text>
        </g>

        <!-- ============ Legend ============ -->
        <g class="leg">
          <rect x="40"  y="592" width="16" height="16" rx="3" fill="var(--teal)"/>
          <text x="63"  y="605">Wolfgang ↔ Zeisl segments</text>

          <rect x="262" y="592" width="16" height="16" rx="3" fill="var(--teal-core)"/>
          <text x="285" y="605">Triangulation core</text>

          <rect x="430" y="592" width="16" height="16" rx="3" fill="var(--violet)"/>
          <text x="453" y="605">Bernstein/Levine group (Wolfgang)</text>

          <rect x="700" y="592" width="16" height="16" rx="3" fill="var(--grey)" opacity="0.8"/>
          <text x="723" y="605">Fisher (not with Wolfgang)</text>
        </g>

        <!-- ============ Caption ============ -->
        <text class="cap" x="40" y="652">Own research finding (GEDmatch/FTDNA, 2026); positions GRCh37. cM = centimorgan, a measure of shared segment length.</text>
        <text class="cap" x="40" y="668">No primary source — work in progress.</text>
      </svg>
    </div>
  </div>
</body>
</html>
